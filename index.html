<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sabash Restaurant</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/style.css" rel="stylesheet" />
    <style>
  :root {
    --chat--color-primary: #e87722;
    --chat--color-primary-shade-50: #d4691a;
    --chat--color-primary-shade-100: #c05a10;
    --chat--color-secondary: #e87722;
    --chat--color-secondary-shade-50: #d4691a;
    --chat--header--background: #e87722;
    --chat--header--color: #ffffff;
    --chat--message--bot--background: #fff3e8;
    --chat--message--bot--color: #333333;
    --chat--message--user--background: #e87722;
    --chat--message--user--color: #ffffff;
    --chat--toggle--background: #e87722;
    --chat--toggle--hover--background: #d4691a;
    --chat--toggle--color: #ffffff;
    --chat--input--send--button--background: #e87722;
  }
</style>
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/chat.bundle.es.js';

      createChat({
        webhookUrl: 'https://sabash3111-sabash-n8n.hf.space/webhook/62a63126-9c5c-4c3d-b729-029f9b89e72a/chat',
        mode: 'window',
        chatInputKey: 'chatInput',
        initialMessages: [
          'Hi there! 👋 My name is Zarah. How can I assist you today?'
        ],
        i18n: {
          en: {
            title: 'Sabash Restaurant 🍽️',
            subtitle: 'Ask me about menu, reservations & more!',
            inputPlaceholder: 'Type your message...',
          }
        }
      });
    </script>
    <div id="n8n-chat"></div>
  </body>
